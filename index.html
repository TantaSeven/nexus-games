<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Мое Мини Приложение</title>
    <!-- Подключаем связь с VK -->
    <script src="https://unpkg.com"></script>
    <style>
    body {
        font-family: -apple-system, system-ui, "Helvetica Neue", Roboto, sans-serif;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100vh;
        margin: 0;
        background-color: #f5f5f5;
    }
    button {
        padding: 12px 24px;
        background-color: #0077ff;
        color: white;
        border: none;
        border-radius: 8px;
        font-size: 16px;
        cursor: pointer;
    }
    button:active {
        background-color: #0066dd;
    }
</style>

</head>
<body>
    <h1>Привет! Это мое приложение.</h1>
    <button id="show-user">Узнать мой ID</button>

<div id="user-info">
    <h1 id="greeting">Загрузка...</h1>
    <img id="avatar" src="" style="border-radius: 50%; display: none; width: 100px;">
</div>

<script>
    // 1. Инициализация (обязательно!)
    vkBridge.send('VKWebAppInit');

    // 2. Запрос данных профиля при запуске
    vkBridge.send('VKWebAppGetUserInfo')
        .then((data) => {
            if (data.id) {
                // Если данные получены, выводим имя и аватар
                document.getElementById('greeting').innerText = `Привет, ${data.first_name}!`;
                
                const avatar = document.getElementById('avatar');
                avatar.src = data.photo_100;
                avatar.style.display = 'block';
            }
        })
        .catch((error) => {
            // Если пользователь запретил доступ или произошла ошибка
            console.error(error);
            document.getElementById('greeting').innerText = 'Ошибка доступа';
        });
</script>


</body>
</html>
