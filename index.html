<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Мое Мини Приложение</title>
    <!-- Подключаем связь с VK -->
    <script src="https://unpkg.com"></script>
    <style>
    body {
        font-family: -apple-system, system-ui, "Helvetica Neue", Roboto, sans-serif;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100vh;
        margin: 0;
        background-color: #f5f5f5;
    }
    button {
        padding: 12px 24px;
        background-color: #0077ff;
        color: white;
        border: none;
        border-radius: 8px;
        font-size: 16px;
        cursor: pointer;
    }
    button:active {
        background-color: #0066dd;
    }
</style>

</head>
<body>
    <h1>Привет! Это мое приложение.</h1>
    <button id="show-user">Узнать мой ID</button>

    <script>
        // Инициализируем VK Bridge
        vkBridge.send('VKWebAppInit');

        document.getElementById('show-user').onclick = function() {
            vkBridge.send('VKWebAppGetUserInfo').then((data) => {
                alert('Твой ID: ' + data.id);
            });
        };
    </script>
</body>
</html>
